<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتب مساعد مدير إدارة الدعوة والإرشاد الديني</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --pr:#1B5FA6; --pr-d:#0B3B6B; --pr-l:#2E76C2; --pr-2:#E6EFF9;
  --gold:#8A1538; --gold-l:#F7E3E8;
  --maroon:#C0392B; --maroon-2:#FBE7E4;
  --bg:#F5F7FA; --card:#FFFFFF; --ink:#16212B; --muted:#5B6A78; --border:#DDE4EC;
  --amber:#B5720A; --amber-2:#FDF1DE;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Tajawal',Arial;background:var(--bg);color:var(--ink);direction:rtl}
h1,h2,.disp{font-family:'IBM Plex Sans Arabic','Tajawal',Arial}
h3,h4{font-family:'IBM Plex Sans Arabic','Tajawal',Arial}
button,input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:#c5d2cc;border-radius:9px}

/* ---------- Login ---------- */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,var(--pr-d) 0%,var(--pr) 55%,#082C52 100%);position:relative;overflow:hidden}
#login-screen::before{content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle at 15% 20%, rgba(138,21,56,.12) 0, transparent 40%),
                    radial-gradient(circle at 85% 80%, rgba(138,21,56,.10) 0, transparent 45%);}
.login-card{position:relative;background:var(--card);border-radius:18px;padding:38px 34px;width:420px;max-width:92vw;
  box-shadow:0 30px 60px rgba(0,0,0,.35);border-top:5px solid var(--gold)}
.login-logo{width:64px;height:64px;border-radius:16px;background:var(--pr-2);display:flex;align-items:center;
  justify-content:center;font-size:32px;margin:0 auto 14px}
.login-title{text-align:center;font-weight:800;font-size:19px;color:var(--pr-d);margin-bottom:4px}
.login-sub{text-align:center;color:var(--muted);font-size:12.5px;margin-bottom:22px}
.login-users{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;margin-bottom:14px}
.login-user-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--border);
  border-radius:10px;background:#fafcfb;cursor:pointer;text-align:right;transition:.15s}
.login-user-btn:hover{border-color:var(--pr-l);background:var(--pr-2)}
.login-user-av{width:34px;height:34px;border-radius:9px;background:var(--pr);color:#fff;display:flex;align-items:center;
  justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.login-user-name{font-weight:700;font-size:13.5px}
.login-user-role{font-size:11px;color:var(--muted)}

/* ---------- App shell ---------- */
#app-shell{display:none;min-height:100vh}
#app-shell.show{display:flex}
.sidebar{width:252px;flex-shrink:0;background:linear-gradient(195deg,#0B3B6B 0%,#1B5FA6 65%,#082C52 100%);color:#fff;display:flex;flex-direction:column;
  height:100vh;position:sticky;top:0;box-shadow:2px 0 24px rgba(0,0,0,.15);transition:width .25s ease,min-width .25s ease;overflow:hidden}
.sidebar.collapsed{width:0;min-width:0}
.sb-brand{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid rgba(255,255,255,.12)}
.sb-brand .ic{width:38px;height:38px;border-radius:10px;background:rgba(138,21,56,.18);display:flex;
  align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sb-brand-t{font-weight:800;font-size:13px;line-height:1.35}
.sb-brand-s{font-size:10.5px;opacity:.65}
.sb-nav{flex:1;overflow-y:auto;padding:10px 10px}
.sb-group-lbl{font-size:10.5px;color:rgba(255,255,255,.45);font-weight:700;padding:12px 10px 5px;letter-spacing:.5px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:9px;color:rgba(255,255,255,.82);
  cursor:pointer;font-size:13px;font-weight:600;margin-bottom:2px;position:relative}
.nav-item .ic{width:18px;text-align:center;flex-shrink:0;font-size:15px}
.nav-item:hover{background:rgba(255,255,255,.07)}
.nav-item.active{background:var(--gold);color:var(--pr-d);box-shadow:0 0 16px rgba(138,21,56,.55)}
.nav-item .badge{margin-right:auto;background:var(--maroon);color:#fff;font-size:10px;font-weight:800;
  border-radius:20px;padding:1px 7px}
.sb-user{padding:12px 14px;border-top:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:9px}
.sb-user-av{width:32px;height:32px;border-radius:8px;background:var(--gold);color:var(--pr-d);display:flex;
  align-items:center;justify-content:center;font-weight:800;font-size:13px}
.sb-user-name{font-size:12.5px;font-weight:700}
.sb-user-role{font-size:10px;opacity:.6}
.sb-logout{margin-right:auto;background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:15px}

.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 26px;display:flex;
  align-items:center;justify-content:space-between}
.topbar-brand{display:flex;align-items:center;gap:14px}
.topbar-logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--pr),var(--pr-d));
  color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;
  box-shadow:0 0 14px rgba(27,95,166,.4)}
.title-glow{background:linear-gradient(135deg,var(--pr-d),var(--pr));color:#fff;padding:9px 20px;border-radius:10px;
  box-shadow:0 0 18px rgba(27,95,166,.45), inset 0 0 12px rgba(138,21,56,.25)}
.topbar h1{font-size:16.5px;font-weight:800;color:#fff}
.topbar .sub{font-size:11px;color:rgba(255,255,255,.75);margin-top:2px}
.content{padding:22px 26px;flex:1}

/* ---------- Shared components ---------- */
.section-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.section-head h2{font-size:19px;font-weight:800;color:var(--pr-d)}
.section-head p{font-size:12px;color:var(--muted);margin-top:3px}
.card{background:var(--card);border-radius:12px;border:1px solid var(--border)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;border-top:3px solid var(--pr)}
.kpi .v{font-size:23px;font-weight:900;color:var(--pr-d)}
.kpi .l{font-size:11.5px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:5px;margin-bottom:16px;width:fit-content}
.tab-btn{padding:8px 18px;border:none;background:none;border-radius:7px;cursor:pointer;font-weight:700;font-size:13px;color:var(--muted)}
.tab-btn.active{background:var(--pr);color:#fff}
.table-wrap{overflow-x:auto;border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th{background:var(--pr-2);color:var(--pr-d);padding:10px 12px;text-align:right;font-weight:800;white-space:nowrap;border-bottom:2px solid var(--pr)}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:#fafcfb}
.empty{text-align:center;color:var(--muted);padding:34px !important}
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.pill.green{background:var(--pr-2);color:var(--pr-d)}
.pill.gold{background:var(--gold-l);color:#6b0f2a}
.pill.maroon{background:var(--maroon-2);color:var(--maroon)}
.pill.amber{background:var(--amber-2);color:var(--amber)}
.pill.gray{background:#eef1f5;color:var(--muted)}
.btn{background:var(--pr);color:#fff;border:none;padding:9px 18px;border-radius:9px;font-weight:700;font-size:13px;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--pr-l)}
.btn.secondary{background:var(--card);color:var(--pr-d);border:1.5px solid var(--border)}
.btn.gold{background:var(--gold);color:var(--pr-d)}
.btn.danger{background:var(--maroon);color:#fff}
.btn.sm{padding:6px 12px;font-size:11.5px;border-radius:7px}
.note-banner{background:var(--pr-2);border:1px solid #c3d9f0;color:var(--pr-d);border-radius:10px;padding:10px 14px;
  font-size:12.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.note-banner.gold{background:var(--gold-l);border-color:#e3b5c0;color:#6b0f2a}

/* forms */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;font-weight:700;color:var(--pr-d)}
.field .hint{color:var(--muted);font-weight:400;font-size:11px}
.field input,.field select,.field textarea{padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-size:12.5px;background:#fff}
.field textarea{resize:vertical;min-height:60px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--pr)}
.checks{display:flex;flex-wrap:wrap;gap:8px}
.chk-item{display:flex;align-items:center;gap:6px;background:#fafcfb;border:1.5px solid var(--border);border-radius:8px;
  padding:6px 10px;font-size:12px;cursor:pointer}
.chk-item input{accent-color:var(--pr)}
.chk-item.done{background:var(--pr-2);border-color:var(--pr)}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(6,20,15,.55);display:flex;align-items:flex-start;
  justify-content:center;padding:30px 16px;overflow-y:auto;z-index:200}
.modal{background:var(--card);border-radius:14px;width:640px;max-width:100%;overflow:hidden}
.modal.lg{width:820px}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--pr-d);color:#fff}
.mhead h3{font-size:15.5px;font-weight:800}
.x-close{background:rgba(255,255,255,.15);border:none;color:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:14px}
.mbody{padding:18px 20px;max-height:70vh;overflow-y:auto}
.mfoot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-start}

/* misc */
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input,.search-bar select{padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:12.5px;background:#fff}
.line-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.hint{color:var(--muted);font-size:11px}
a.link{color:var(--pr);font-weight:700;text-decoration:none}
.progress-track{background:#eef1f5;border-radius:20px;height:7px;overflow:hidden;width:100%}
.progress-fill{height:100%;background:var(--pr)}
@media(max-width:900px){.sidebar{position:fixed;z-index:150;transform:translateX(105%);transition:.25s}
  .sidebar.open{transform:translateX(0)}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <img src="" id="login-logo-img" style="width:100%;border-radius:10px;margin-bottom:14px">
    <div class="login-title">مكتب مساعد مدير إدارة الدعوة والإرشاد الديني</div>
    <div class="login-sub">سجّل الدخول باسم المستخدم وكلمة المرور</div>
    <div id="login-form-area"></div>
  </div>
</div>

<div id="app-shell">

  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <div class="topbar-brand">
        <button class="icon-btn" onclick="toggleSidebar()" title="طي/فتح القائمة">☰</button>
        <div class="topbar-logo"><img id="topbar-logo-img" style="width:100%;height:100%;object-fit:contain"></div>
        <div class="title-glow"><h1 id="page-title"></h1><div class="sub" id="page-sub"></div></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;position:relative">
        <input id="global-search" placeholder="🔍 بحث شامل..." oninput="runGlobalSearch(this.value)"
          style="padding:8px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:12.5px;width:220px">
        <div id="global-search-results" style="display:none;position:absolute;top:38px;left:0;width:340px;max-height:360px;
          overflow-y:auto;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.15);z-index:300"></div>
        <span class="pill green" id="today-pill"></span>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div id="modal-root"></div>

function findUser(u){return state.users.find(x=>x.username===u);}
function CU(){return findUser(state.currentUser);}
function isAdmin(){return CU()&&CU().role==='admin';}
function canEdit(){return isAdmin();}
function isAssistantOffice(){return CU()&&(CU().role==='admin'||CU().role==='assistant');}
function canSeeAll(){return isAssistantOffice();}

/* ============================= STRATEGIC PLAN ROLL-UPS ============================= */
function pct(actual,target){if(!target)return 0;return Math.min(100,Math.round((actual/target)*100));}
function annualEventChildren(aeId){return state.monthlyEvents.filter(me=>me.fromAnnualId===aeId);}
function annualCompletion(ae){
  const kids=annualEventChildren(ae.id);
  if(!kids.length)return 0;
  return Math.round(kids.reduce((s,me)=>s+pct(me.targetCountActual||0,me.targetCount||0),0)/kids.length);
}
function objectiveCompletion(ob){
  const evs=state.annualEvents.filter(e=>e.objectiveId===ob.id);
  if(!evs.length)return 0;
  return Math.round(evs.reduce((s,e)=>s+annualCompletion(e),0)/evs.length);
}
function projectCompletion(p){
  const ob=state.objectives.find(o=>o.id===p.objectiveId);
  return ob?objectiveCompletion(ob):0;
}
function domainCompletion(dm){
  const objs=state.objectives.filter(o=>o.domainId===dm.id);
  if(!objs.length)return 0;
  return Math.round(objs.reduce((s,o)=>s+objectiveCompletion(o),0)/objs.length);
}
function irCompletion(ir){
  const doms=state.domains.filter(d=>d.irId===ir.id);
  if(!doms.length)return 0;
  return Math.round(doms.reduce((s,d)=>s+domainCompletion(d),0)/doms.length);
}
function planCompletion(){
  const irs=state.intermediateResults.filter(i=>i.year===state.planYear);
  if(!irs.length)return 0;
  return Math.round(irs.reduce((s,i)=>s+irCompletion(i),0)/irs.length);
}
function completionColor(p){return p>=100?'#8A1538':p>=50?'#1B5FA6':p>0?'#B5720A':'#94A3A8';}

function runGlobalSearch(q){
  const box=document.getElementById('global-search-results');
  q=(q||'').trim();
  if(!q){box.style.display='none';return;}
  const results=[];
  state.annualEvents.forEach(e=>{if(e.project.includes(q))results.push({label:e.project,type:'فعالية سنوية',view:'annual'});});
  state.monthlyEvents.forEach(e=>{if(e.event.includes(q))results.push({label:e.event,type:'فعالية شهرية',view:'monthly'});});
  state.projects.forEach(p=>{if(p.name.includes(q))results.push({label:p.name,type:'مشروع',view:'strategic'});});
  state.objectives.forEach(o=>{if(o.name.includes(q))results.push({label:o.name,type:'هدف',view:'strategic'});});
  state.memos.forEach(m=>{if(m.title.includes(q)||m.number.includes(q))results.push({label:m.title,type:'مذكرة',view:'memos'});});
  state.tasks.forEach(t=>{if(t.title.includes(q))results.push({label:t.title,type:'مهمة',view:'tasks'});});
  state.roznama.forEach(r=>{if((r.project||'').includes(q))results.push({label:r.project,type:'رزنامة',view:'roznama'});});
  box.style.display='block';
  box.innerHTML=results.length?results.slice(0,20).map(r=>`
    <div onclick="navigate('${r.view}');document.getElementById('global-search-results').style.display='none';document.getElementById('global-search').value=''"
      style="padding:9px 14px;border-bottom:1px solid #eef1f6;cursor:pointer;font-size:12.5px;display:flex;justify-content:space-between;gap:8px">
      <span>${esc(r.label)}</span><span class="pill gray">${r.type}</span></div>`).join('')
    :'<div style="padding:14px;text-align:center;color:var(--muted);font-size:12px">لا توجد نتائج</div>';
}

  document.getElementById('login-form-area').innerHTML=`
    <div class="field" style="margin-bottom:10px"><input type="text" id="login-username" placeholder="اسم المستخدم" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px" onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()"></div>
    <div class="field"><input type="password" id="login-pass" placeholder="كلمة المرور" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px" onkeydown="if(event.key==='Enter')submitDirectLogin()"></div>
    <div id="login-err" style="color:var(--maroon);font-size:12px;display:none;margin-top:6px"></div>
    <button class="btn" style="width:100%;justify-content:center;margin-top:12px" onclick="submitDirectLogin()">دخول</button>
    <div style="text-align:center;margin-top:14px;font-size:12px">
      <a href="javascript:void(0)" onclick="openRegisterModal()" style="color:var(--pr);font-weight:700">＋ طلب اسم مستخدم جديد</a>
    </div>`;
}
function submitDirectLogin(){
  const username=document.getElementById('login-username').value.trim();
  const pass=document.getElementById('login-pass').value;
  const u=findUser(username);
  const errEl=document.getElementById('login-err');
  if(!u){errEl.textContent='اسم المستخدم غير موجود';errEl.style.display='block';return;}
  if(u.status==='pending'){errEl.textContent='طلبك لا يزال بانتظار موافقة مدير النظام';errEl.style.display='block';return;}
  if(u.status==='rejected'){errEl.textContent='تم رفض طلب هذا الحساب. تواصل مع مدير النظام';errEl.style.display='block';return;}
  if(pass!==u.password){errEl.textContent='كلمة المرور غير صحيحة';errEl.style.display='block';return;}
  doLogin(u.username);
}
function roleLabel(r){return r==='admin'?'مدير النظام':r==='assistant'?'مكتب مساعد المدير':'مستخدم قسم';}

}
function submitRegister(){
  const name=document.getElementById('rg-name').value.trim();
  const email=document.getElementById('rg-email').value.trim();
  const phone=document.getElementById('rg-phone').value.trim();
  const username=document.getElementById('rg-username').value.trim();
  const pass=document.getElementById('rg-pass').value;
  const depts=[...document.querySelectorAll('.rg-dept:checked')].map(c=>c.value);
  if(!name||!email||!phone||!username||!pass){alert('يرجى تعبئة جميع الحقول');return;}
  if(!depts.length){alert('اختر قسماً واحداً على الأقل');return;}
  if(findUser(username)){alert('اسم المستخدم محجوز مسبقاً، اختر اسماً آخر');return;}
  state.users.push({username,password:pass,name,email,phone,role:'dept',dept:depts[0],deptsRequested:depts,status:'pending'});
  logAudit('طلب حساب جديد','users',name+' ('+username+')');
  closeModal();
  alert('تم إرسال طلبك بنجاح. سيصلك بريد إلكتروني إلى '+email+' فور موافقة مدير النظام.');
  renderLoginScreen();
}
function doLogin(u){
  state.currentUser=u;
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app-shell').classList.add('show');
  state.view= (CU().role==='dept')?'annual':'dashboard';
  logAudit('تسجيل دخول','users',CU().name);
  render();
}
function doLogout(){
  state.currentUser=null;
  document.getElementById('app-shell').classList.remove('show');
  document.getElementById('login-screen').style.display='flex';
  renderLoginScreen();
}
function navigate(key){state.view=key;state.tab={};render();}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('collapsed');}

function renderSidebar(){
  const role=CU().role;
  const html=NAV.map(g=>{
    const items=g.items.filter(it=>it.roles.includes(role));
    if(!items.length)return'';
    return (g.group?`<div class="sb-group-lbl">${g.group}</div>`:'')+items.map(it=>{
      const badge=it.badge?it.badge():0;
      return `<div class="nav-item ${state.view===it.key?'active':''}" onclick="navigate('${it.key}')">
        <span class="ic">${it.icon}</span><span>${it.label}</span>
        ${badge>0?`<span class="badge">${badge}</span>`:''}</div>`;
    }).join('');
  }).join('');
  document.getElementById('sidebar').innerHTML=`

      <button class="sb-logout" onclick="doLogout()" title="تسجيل خروج">⏻</button>

        <div class="field"><label>رقم الجوال</label><input id="ph-mobile" required value="${item?esc(item.mobile||''):''}"></div>
        <div class="field"><label>الصفة</label><input id="ph-position" value="${item?esc(item.position||''):''}"></div>
        ${isSwitch?`<div class="field"><label>الإدارة</label><input id="ph-mgmt" value="${item?esc(item.management||''):''}"></div>
        <div class="field"><label>القسم</label><select id="ph-section"><option value="">—</option>${DEPTS.map(d=>`<option ${item&&item.section===d?'selected':''}>${d}</option>`).join('')}</select></div>`
        :`<div class="field" style="grid-column:1/-1"><label>ملاحظات</label><textarea id="ph-notes">${item?esc(item.notes||''):''}</textarea></div>`}
      </div>
    </div>
    <div class="mfoot"><button class="btn" onclick="submitAddPhone('${tab}','${id||''}')">💾 حفظ</button><button class="btn secondary" onclick="closeModal()">إلغاء</button></div>
  </div></div>`);
}
function submitAddPhone(tab,id){
  const name=document.getElementById('ph-name').value.trim();
  if(!name){alert('أدخل الاسم');return;}
  if(tab==='switch'){
    const data={name,line:document.getElementById('ph-line').value,
      mobile:document.getElementById('ph-mobile').value,position:document.getElementById('ph-position').value,
      management:document.getElementById('ph-mgmt').value,section:document.getElementById('ph-section').value};
    if(id){Object.assign(state.switchboard.find(x=>x.id===id),data);}
    else{state.switchboard.push({id:uid(),...data});}
  }else{
    const data={name,mobile:document.getElementById('ph-mobile').value,
      position:document.getElementById('ph-position').value,notes:document.getElementById('ph-notes').value};
    if(id){Object.assign(state.phones.find(x=>x.id===id),data);}
    else{state.phones.push({id:uid(),...data});}
  }
  closeModal();render();
}
function checkRequired(ids){
  for(const id of ids){
    const el=document.getElementById(id);
    if(!el)continue;
    if(!el.value||!String(el.value).trim()){
      if(el.reportValidity)el.reportValidity();
      el.style.borderColor='var(--maroon)';
      el.focus();
      return false;
    }
  }
  return true;
}
function delRow(arrName,id){
  if(!confirm('تأكيد الحذف؟'))return;
  state[arrName]=state[arrName].filter(x=>x.id!==id);
  render();
}

function toggleMemoDeptDone(id,dept,val){
  const m=state.memos.find(x=>x.id===id);if(!m)return;
  if(!m.doneByDept)m.doneByDept={};
  m.doneByDept[dept]=val;
  if(m.followDepts.every(d=>m.doneByDept[d]))m.status='منجزة';
  else if(m.status==='منجزة')m.status='قيد المتابعة';
  render();openMemoModal(id);
}
function submitMemo(id){
  if(!checkRequired(['mm-title','mm-date','mm-type','mm-sender','mm-expected']))return;
  const title=document.getElementById('mm-title').value.trim();
  if(!title){alert('أدخل عنوان المذكرة');return;}
  const followDepts=[...document.querySelectorAll('#mm-depts input:checked')].map(c=>c.value);
  if(!followDepts.length){alert('اختر قسم متابعة واحداً على الأقل');return;}
  const data={number:document.getElementById('mm-number').value,title,date:document.getElementById('mm-date').value,
    type:document.getElementById('mm-type').value,sender:document.getElementById('mm-sender').value,
    followDepts,expectedDate:document.getElementById('mm-expected').value,
    deptReply:document.getElementById('mm-reply').value,requiredAction:document.getElementById('mm-action').value,
    deptStatement:document.getElementById('mm-statement').value,outgoingNo:document.getElementById('mm-outno').value,
    status:document.getElementById('mm-status').value,notes:document.getElementById('mm-notes').value};
  if(id){const m=state.memos.find(x=>x.id===id);Object.assign(m,data);
    followDepts.forEach(d=>{if(!m.doneByDept)m.doneByDept={};if(!(d in m.doneByDept))m.doneByDept[d]=false;});
  }else{state.memos.push({id:uid(),...data,doneByDept:{}});}
  closeModal();render();
}

function toggleDeptDone(id,dept,val){
  const rz=state.roznama.find(x=>x.id===id);if(!rz)return;
  rz.doneByDept[dept]=val;
  const allDone=rz.depts.every(d=>rz.doneByDept[d]);
  rz.status=allDone?'منجز':(rz.actualStart?'قيد التنفيذ':'لم يبدأ');
  render();openRoznamaModal(id);
}
function submitRoznama(id,addAnother){
  if(!checkRequired(['rz-project','rz-planned','rz-end']))return;
  const depts=[...document.querySelectorAll('#rz-depts input:checked')].map(c=>c.value);
  if(!depts.length){alert('اختر جهة واحدة على الأقل');return;}
  const data={month:document.getElementById('rz-month').value,project:document.getElementById('rz-project').value,
    plannedStart:document.getElementById('rz-planned').value,
    actualStart:document.getElementById('rz-actual').value,endDate:document.getElementById('rz-end').value,
    status:document.getElementById('rz-status').value,depts};
  if(id){const rz=state.roznama.find(x=>x.id===id);Object.assign(rz,data);
    depts.forEach(d=>{if(!(d in rz.doneByDept))rz.doneByDept[d]=false;});
  }else{
    state.roznama.push({id:uid(),seq:state.roznama.length+1,...data,doneByDept:{}});
  }
  if(addAnother){const savedMonth=data.month;closeModal();render();openRoznamaModal();document.getElementById('rz-month').value=savedMonth;}
  else{closeModal();render();}
}
function printRoznama(){
  const dept=prompt('اكتب اسم القسم للتصفية (اتركه فارغاً لكل الأقسام):\n'+DEPTS.join('، '))||'';
  const month=prompt('اكتب اسم الشهر للتصفية (اتركه فارغاً لكل الأشهر):\n'+MONTHS_AR.join('، '))||'';
  const list=state.roznama.filter(rz=>(!dept||rz.depts.includes(dept))&&(!month||rz.month===month));
  const body=`<table><thead><tr><th>الشهر</th><th>المشروع</th><th>بداية مخطط</th><th>بداية فعلي</th><th>النهاية</th>

    <tbody>${list.map(rz=>`<tr><td>${rz.month}</td><td>${rz.project||'—'}</td><td>${rz.plannedStart}</td><td>${rz.actualStart}</td>
      <td>${rz.endDate}</td><td>${completionPct(rz)}%</td><td>${rz.depts.join('، ')}</td><td>${roznamaRemaining(rz).join('، ')||'—'}</td><td>${rz.status}</td></tr>`).join('')

function exportRoznamaExcel(){

  item.name=newName;
  // تحديث كل الفعاليات المرتبطة بهذا الاسم كي لا ينكسر الربط
  state.annualEvents.forEach(e=>{
    if(kind==='place'&&e.location===oldName)e.location=newName;
    if(kind==='target'&&e.targetGroup===oldName)e.targetGroup=newName;
  });
  logAudit('تعديل اسم',kind==='place'?'مكان تنفيذ':'فئة مستفيدين',oldName+' ← '+newName);
  openPlacesGroupsModal();
}
function isDuplicateAnnual(project,dept,startDate,excludeId){
  return state.annualEvents.some(e=>e.id!==excludeId&&e.project.trim()===project.trim()&&e.dept===dept&&e.startDate===startDate);
}
function submitAnnual(id,addAnother){
  if(!checkRequired(['an-project','an-desc','an-target','an-location','an-timing','an-start','an-end',
    'an-indicator-value','an-risks','an-risksolutions','an-deliverables','an-amiri','an-notes']))return;
  const project=document.getElementById('an-project').value.trim();
  if(!project){alert('أدخل اسم الفعالية');return;}
  const objectiveId=document.getElementById('an-objectiveid').value;
  if(!objectiveId){alert('الربط بالخطة الاستراتيجية (الهدف المحدد) إلزامي');return;}
  const cooperators=[...document.querySelectorAll('.an-coop-chk:checked')].map(c=>c.value);
  if(!cooperators.length){alert('اختر جهة متعاونة واحدة على الأقل');return;}
  const deptEl=document.getElementById('an-dept');
  const dept = deptEl?deptEl.value:CU().dept;
  const startDate=document.getElementById('an-start').value;
  if(isDuplicateAnnual(project,dept,startDate,id)){alert('⚠️ توجد فعالية بنفس الاسم ونفس القسم ونفس تاريخ التنفيذ مسبقاً — لا يُسمح بالتكرار');return;}
  const data={month:monthOfDate(startDate),project,desc:document.getElementById('an-desc').value,
    objectiveId,
    targetGroup:document.getElementById('an-target').value,
    location:document.getElementById('an-location').value,startDate,
    endDate:document.getElementById('an-end').value,timing:document.getElementById('an-timing').value,
    cooperators,notes:document.getElementById('an-notes').value,
    indicatorType:document.getElementById('an-indicator-type').value,indicatorValue:document.getElementById('an-indicator-value').value,
    expectedRisks:document.getElementById('an-risks').value,riskSolutions:document.getElementById('an-risksolutions').value,
    deliverables:document.getElementById('an-deliverables').value,amiriDirectives:document.getElementById('an-amiri').value};
  data.dept=dept;
  if(id){
    const e=state.annualEvents.find(x=>x.id===id);
    if(isAdmin()){ Object.assign(e,data); }
    else{ e.pendingEdit=data; }
    alert(isAdmin()?'تم حفظ التعديل':'تم إرسال التعديل بانتظار اعتماد مدير النظام');
    closeModal();render();
  }else{
    state.annualEvents.push({id:uid(),...data,status:isAdmin()?'معتمد':'بانتظار الاعتماد',pendingEdit:null});
    if(addAnother){closeModal();render();openAnnualModal();}
    else{closeModal();render();}
  }
}
function approveAnnual(id){
  const e=state.annualEvents.find(x=>x.id===id);if(!e)return;
  if(e.pendingEdit){Object.assign(e,e.pendingEdit);e.pendingEdit=null;e.status='معتمد';}
  else{e.status='معتمد';}
  render();
}
function rejectAnnual(id){
  const e=state.annualEvents.find(x=>x.id===id);if(!e)return;
  if(e.pendingEdit){e.pendingEdit=null;}
  else{e.status='مرفوض';}
  render();
}

function doImportAnnual(){
  const inp=document.getElementById('import-file');
  if(!inp.files.length){alert('اختر ملفاً أولاً');return;}
  const file=inp.files[0];
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const sheet=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(sheet);
      let count=0;
      json.forEach(row=>{
        const project=row['الفعالية']||row['المشروع']||row['project'];
        if(!project)return;
        state.annualEvents.push({id:uid(),project:String(project),desc:String(row['الوصف']||''),
          targetGroup:String(row['الفئة المستهدفة']||approvedGroups()[0]?.name||''),
          startDate:row['تاريخ البداية']||'',endDate:row['تاريخ النهاية']||'',timing:String(row['التوقيت']||''),
          location:String(row['المكان']||approvedPlaces()[0]?.name||''),cooperators:String(row['الجهات المتعاونة']||''),
          notes:'',dept:CU().dept||DEPTS[0],status:isAdmin()?'معتمد':'بانتظار الاعتماد',pendingEdit:null});
        count++;
      });
      document.getElementById('import-status').textContent='تم استيراد '+count+' فعالية بنجاح.';
      render();
    }catch(err){document.getElementById('import-status').textContent='تعذّر قراءة الملف. تأكد من الصيغة.';}
  };
  reader.readAsArrayBuffer(file);
}

function doMigrateAll(){
  const checks=[...document.querySelectorAll('.mg-check:checked')];
  if(!checks.length){alert('اختر فعالية واحدة على الأقل');return;}
  const dept=document.getElementById('mg-dept').value;
  let count=0,skipped=0,blocked=0;
  checks.forEach(chk=>{
    const id=chk.value;
    const e=state.annualEvents.find(x=>x.id===id);
    if(!e)return;
    if(dept&&e.dept!==dept){blocked++;return;}
    const month=monthOfDate(e.startDate);
    if(state.monthlyEvents.some(m=>m.fromAnnualId===id&&m.month===month)){skipped++;return;}
    const targetInput=document.querySelector('.mg-target[data-id="'+id+'"]');
    const notesInput=document.querySelector('.mg-notes[data-id="'+id+'"]');
    state.monthlyEvents.push({id:uid(),event:e.project,desc:e.desc,month,dept:e.dept,startDate:e.startDate,endDate:e.endDate,
      location:e.location,cooperators:e.cooperators||[],
      targetCount:parseInt(targetInput.value)||0,targetCountActual:0,beneficiariesCount:0,
      notes:notesInput.value||'',fromAnnualId:e.id,
      migratedAt:new Date().toLocaleString('en-GB')});
    logAudit('ترحيل لفعالية شهرية',e.project,'إلى شهر '+month+' — قسم '+e.dept);
    count++;
  });
  closeModal();render();
  alert('تم ترحيل '+count+' فعالية بنجاح إلى الفعاليات الشهرية.'+(skipped?' (تم تجاوز '+skipped+' فعالية مُرحّلة مسبقاً لنفس الشهر)':'')+(blocked?' (مُنع ترحيل '+blocked+' فعالية لعدم مطابقتها للقسم المختار)':''));
}

function renderAchievements(){

  const rows=list.map(e=>`<tr><td style="font-weight:700">${esc(e.event)}</td><td>${esc(e.dept)}</td><td><span class="pill gold">${e.month}</span></td>

      <div class="kpi" style="border-top-color:${pct>=80?'#1B5FA6':pct>=50?'#B5720A':'#8A1538'}"><div class="v">${pct}%</div><div class="l">نسبة الإنجاز عن المستهدف</div></div>
    </div>
    <div class="quickbar"><button class="btn sm secondary" onclick="printAchvQuarter()">🖨️ طباعة تقرير الربع</button></div>
    <div class="table-wrap card"><table><thead><tr><th>الفعالية</th><th>القسم</th><th>الشهر</th><th>تاريخ التنفيذ</th><th>العدد الفعلي</th><th>ملاحظات</th></tr></thead>

function printAchvQuarter(){
  const scope=canSeeAll()?state.monthlyEvents:state.monthlyEvents.filter(e=>e.dept===CU().dept);

  const list=scope.filter(e=>quarterOfMonth(e.month)===q);
  const body=`<table><thead><tr><th>الفعالية</th><th>القسم</th><th>الشهر</th><th>تاريخ التنفيذ</th><th>العدد الفعلي</th></tr></thead>

}
function openTaskModal(id){
  const t=id?state.tasks.find(x=>x.id===id):null;
  openModal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="mhead"><h3>${t?'تعديل مهمة':'إضافة مهمة'}</h3><button class="x-close" onclick="closeModal()">✕</button></div>

      <div class="form-grid">

        <div class="field" style="grid-column:1/-1"><label>الوصف</label><textarea id="tk-desc">${t?esc(t.desc):''}</textarea></div>
        <div class="field"><label>الجهة المكلَّفة</label>
          <select id="tk-assigned">
            ${isAssistantOffice()?`<option value="assist_only" ${t&&t.assignedDept==='assist_only'?'selected':''}>مكتب مساعد المدير فقط</option>`:''}
            ${DEPTS.map(d=>`<option value="${d}" ${t&&t.assignedDept===d?'selected':''}>${d}</option>`).join('')}
          </select>
        </div>
        <div class="field"><label>تاريخ الاستحقاق</label><input id="tk-due" required type="date" value="${t?t.dueDate:''}"></div>
      </div>
    </div>
    <div class="mfoot"><button class="btn" onclick="submitTask('${id||''}')">💾 حفظ</button><button class="btn secondary" onclick="closeModal()">إلغاء</button></div>
  </div></div>`);
}
function submitTask(id){
  if(!checkRequired(['tk-title','tk-due']))return;
  const title=document.getElementById('tk-title').value.trim();
  if(!title){alert('أدخل عنوان المهمة');return;}
  const data={title,desc:document.getElementById('tk-desc').value,assignedDept:document.getElementById('tk-assigned').value,
    dueDate:document.getElementById('tk-due').value};
  if(id){Object.assign(state.tasks.find(x=>x.id===id),data);}
  else{state.tasks.push({id:uid(),...data,owner:CU().dept||'مكتب المدير',status:'لم يبدأ'});}
  closeModal();render();
}

    roznama:{title:'تقرير الرزنامة',headers:['الشهر','المشروع','بداية مخطط','بداية فعلي','النهاية','نسبة الإنجاز','الحالة'],
      rows:state.roznama.map(r=>[r.month,r.project,r.plannedStart,r.actualStart,r.endDate,completionPct(r)+'%',r.status])},
    tasks:{title:'تقرير المهام',headers:['المهمة','الجهة المكلَّفة','تاريخ الاستحقاق','الحالة'],
      rows:state.tasks.map(t=>[t.title,t.assignedDept==='assist_only'?'مكتب مساعد المدير':t.assignedDept,t.dueDate,t.status])}
  };
  const cfg=cfgs[type];
  const body=`<table><thead><tr>${cfg.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
  <tbody>${cfg.rows.map(r=>`<tr>${r.map(c=>`<td>${c||'—'}</td>`).join('')}</tr>`).join('')||`<tr><td colspan="${cfg.headers.length}" style="text-align:center">لا توجد بيانات</td></tr>`}</tbody></table>`;
  const w=window.open('','_blank');
  w.document.write(reportShell(cfg.title,body));
  w.document.close();
}

        <div class="checks">${DEPTS.map(d=>`<label class="chk-item ${depts.includes(d)?'done':''}"><input type="checkbox" class="eu-dept-chk" value="${d}" ${depts.includes(d)?'checked':''}>${d}</label>`).join('')}</div>

function submitEditUser(username){
  const u=findUser(username);if(!u)return;
  const name=document.getElementById('eu-name').value.trim();
  if(!name){alert('أدخل الاسم');return;}
  const role=document.getElementById('eu-role').value;
  const depts=[...document.querySelectorAll('.eu-dept-chk:checked')].map(c=>c.value);
  if(role==='dept'&&!depts.length){alert('اختر قسماً واحداً على الأقل');return;}
  u.name=name;u.role=role;u.email=document.getElementById('eu-email').value;u.phone=document.getElementById('eu-phone').value;
  u.dept=role==='dept'?depts[0]:(role==='assistant'?'مكتب المدير':null);
  u.deptsAssigned=depts;
  logAudit('تعديل مستخدم','users',name);
  closeModal();render();renderLoginScreen();
}
function approveUser(username){
  const u=findUser(username);if(!u)return;
  u.status='approved';
  logAudit('موافقة على حساب','users',u.name);
  alert('📩 (محاكاة) تم إرسال بريد إلكتروني إلى '+u.email+':\n\n"تمت الموافقة على طلبك، يمكنك الآن تسجيل الدخول باسم المستخدم: '+u.username+'"');
  render();
}
function rejectUser(username){
  const u=findUser(username);if(!u)return;
  if(!confirm('تأكيد رفض طلب '+u.name+'؟'))return;
  u.status='rejected';
  logAudit('رفض حساب','users',u.name);
  render();
}
function resetPassword(username){
  const np=prompt('أدخل كلمة المرور الجديدة:');
  if(!np)return;
  findUser(username).password=np;
  render();
}
function addDept(){

  render();
}

function submitAddUser(){
  const name=document.getElementById('us-name').value.trim();

  if(!name||!username){alert('أدخل الاسم واسم المستخدم');return;}

/* ============================= STRATEGIC PLAN ============================= */
function renderStrategic(){
  const years=[...new Set([2026,...state.domains.map(d=>d.year),...state.intermediateResults.map(i=>i.year)])].sort();
  const irs=state.intermediateResults.filter(i=>i.year===state.planYear);
  const rows=[];
  irs.forEach(ir=>{
    const ip=irCompletion(ir);
    const irBadge=`🎯 ${esc(ir.name)}<div class="pill" style="background:${completionColor(ip)}22;color:${completionColor(ip)};margin-top:4px">${ip}%</div>
      ${canEdit()?`<div style="margin-top:5px;display:flex;gap:4px"><button class="btn sm secondary" onclick="openAddIrModal('${ir.id}')">✏️</button>${isAdmin()?`<button class="btn sm secondary" onclick="delRow('intermediateResults','${ir.id}')">🗑️</button>`:''}</div>`:''}`;
    const doms=state.domains.filter(d=>d.irId===ir.id&&d.year===state.planYear);
    if(!doms.length){
      rows.push(`<tr><td style="border-right:5px solid #0B3B6B;background:#1B5FA60d;font-weight:800">${irBadge}</td><td colspan="4" class="hint">لا توجد مجالات رئيسية بعد</td></tr>`);
      return;
    }
    doms.forEach(dm=>{
      const dp=domainCompletion(dm);
      const domBadge=`🧭 ${esc(dm.name)}<div class="pill" style="background:${completionColor(dp)}22;color:${completionColor(dp)};margin-top:4px">${dp}%</div>
        ${canEdit()?`<div style="margin-top:5px;display:flex;gap:4px"><button class="btn sm secondary" onclick="openAddDomainModal('${dm.id}')">✏️</button>${isAdmin()?`<button class="btn sm secondary" onclick="delRow('domains','${dm.id}')">🗑️</button>`:''}</div>`:''}`;
      const objs=state.objectives.filter(o=>o.domainId===dm.id);
      if(!objs.length){
        rows.push(`<tr><td style="border-right:5px solid #0B3B6B;background:#1B5FA60d;font-weight:800">${irBadge}</td>
          <td style="border-right:4px solid ${completionColor(dp)}">${domBadge}</td><td colspan="3" class="hint">لا توجد أهداف محدَّدة بعد</td></tr>`);
        return;
      }
      objs.forEach(ob=>{
        const op=objectiveCompletion(ob);
        const objBadge=`🏁 ${esc(ob.name)}<div class="hint" style="margin-top:3px">خط الأساس: ${ob.baseline||0}</div>
          <div class="hint">أداء: ${esc(ob.perfIndicator||'—')}</div><div class="hint">أثر: ${esc(ob.impactIndicator||'—')}</div>
          <div class="pill" style="background:${completionColor(op)}22;color:${completionColor(op)};margin-top:4px">${op}%</div>
          ${canEdit()?`<div style="margin-top:5px;display:flex;gap:4px"><button class="btn sm secondary" onclick="openAddObjectiveModal('${ob.id}')">✏️</button>${isAdmin()?`<button class="btn sm secondary" onclick="delRow('objectives','${ob.id}')">🗑️</button>`:''}</div>`:''}`;
        const projs=state.projects.filter(p=>p.objectiveId===ob.id);
        if(!projs.length){
          rows.push(`<tr><td style="border-right:5px solid #0B3B6B;background:#1B5FA60d;font-weight:800">${irBadge}</td>
            <td style="border-right:4px solid ${completionColor(dp)}">${domBadge}</td><td>${objBadge}</td><td colspan="2" class="hint">لا توجد مشاريع بعد</td></tr>`);
          return;
        }
        projs.forEach(p=>{
          const pp=projectCompletion(p);
          rows.push(`<tr><td style="border-right:5px solid #0B3B6B;background:#1B5FA60d;font-weight:800">${irBadge}</td>
            <td style="border-right:4px solid ${completionColor(dp)}">${domBadge}</td><td>${objBadge}</td>
            <td>📁 ${esc(p.name)}</td>
            <td><div class="pill" style="background:${completionColor(pp)}22;color:${completionColor(pp)}">${pp}%</div>
              ${canEdit()?`<div style="margin-top:5px;display:flex;gap:4px"><button class="btn sm secondary" onclick="openAddProjectModal('${p.id}')">✏️</button>${isAdmin()?`<button class="btn sm secondary" onclick="delRow('projects','${p.id}')">🗑️</button>`:''}</div>`:''}</td></tr>`);
        });
      });
    });
  });
  return `
    <div class="section-head"><div><p>سنة الخطة: <strong>${state.planYear}</strong> — الإنجاز العام: <strong>${planCompletion()}%</strong></p></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <select onchange="state.planYear=parseInt(this.value);render()" style="padding:8px;border-radius:8px;border:1px solid var(--border)">
          ${years.map(y=>`<option value="${y}" ${state.planYear===y?'selected':''}>${y}</option>`).join('')}
        </select>
        ${canEdit()?`<button class="btn secondary" onclick="copyPlanToNewYear()">📄 نسخ الخطة لسنة جديدة</button>
        <button class="btn secondary" onclick="openAddIrModal()">＋ نتيجة وسيطة</button>
        <button class="btn secondary" onclick="openAddDomainModal()">＋ مجال رئيسي/نشاط تركيز</button>
        <button class="btn secondary" onclick="openAddObjectiveModal()">＋ هدف محدد</button>
        <button class="btn" onclick="openAddProjectModal()">＋ تدخل/مشروع</button>`:''}
      </div>
    </div>
    <div class="progress-track" style="height:12px;margin-bottom:18px"><div class="progress-fill" style="width:${planCompletion()}%;background:linear-gradient(90deg,var(--pr),var(--gold))"></div></div>
    <div class="table-wrap card"><table><thead><tr>
      <th>النتيجة الوسيطة</th><th>مجال رئيسي/نشاط تركيز</th><th>الهدف المحدد</th><th>التدخل/المشروع</th><th>نسبة الإنجاز</th>
    </tr></thead><tbody>${rows.join('')||'<tr><td colspan="5" class="empty">لا توجد نتائج وسيطة مضافة لهذه السنة</td></tr>'}</tbody></table></div>`;
}

    <div class="mhead"><h3>${ir?'تعديل':'إضافة'} نتيجة وسيطة</h3><button class="x-close" onclick="closeModal()">✕</button></div>

      <div class="field"><label>المجال الرئيسي/نشاط التركيز</label><select id="ob-domain">${doms.map(d=>`<option value="${d.id}" ${ob&&ob.domainId===d.id?'selected':''}>${d.name}</option>`).join('')}</select></div>
      <div class="form-grid" style="margin-top:10px">
        <div class="field" style="grid-column:1/-1"><label>اسم الهدف</label><input id="ob-name" value="${ob?esc(ob.name):''}"></div>
        <div class="field"><label>خط الأساس</label><input id="ob-baseline" type="number" min="0" value="${ob?ob.baseline||0:0}"></div>
      </div>
      <h4 style="margin:10px 0 8px;color:var(--pr-d)">مؤشر القياس</h4>
      <div class="form-grid">
        <div class="field"><label>الأثر (مدخلات)</label><input id="ob-impact" placeholder="مثال: نسبة الرضا/الاستفادة" value="${ob?esc(ob.impactIndicator||''):''}"></div>
        <div class="field"><label>الأداء (مدخلات)</label><input id="ob-perf" placeholder="مثال: عدد البرامج المنفذة" value="${ob?esc(ob.perfIndicator||''):''}"></div>
      </div>
    </div>
    <div class="mfoot"><button class="btn" onclick="submitObjective('${id||''}')">💾 حفظ</button><button class="btn secondary" onclick="closeModal()">إلغاء</button></div>
  </div></div>`);
}
function submitObjective(id){
  const v=document.getElementById('ob-name').value.trim();if(!v){alert('أدخل الاسم');return;}
  const data={domainId:document.getElementById('ob-domain').value,name:v,
    baseline:parseInt(document.getElementById('ob-baseline').value)||0,
    perfIndicator:document.getElementById('ob-perf').value,impactIndicator:document.getElementById('ob-impact').value};
  if(id){Object.assign(state.objectives.find(x=>x.id===id),data);logAudit('تعديل','هدف محدد',v);}
  else{state.objectives.push({id:uid(),...data,year:state.planYear});logAudit('إضافة','هدف محدد',v);}
  closeModal();render();
}
function openAddProjectModal(id){
  const p=id?state.projects.find(x=>x.id===id):null;
  const objs=state.objectives.filter(o=>o.year===state.planYear);
  if(!objs.length){alert('أضف هدفاً محدداً أولاً');return;}
  openModal(`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="mhead"><h3>${p?'تعديل':'إضافة'} تدخل/مشروع</h3><button class="x-close" onclick="closeModal()">✕</button></div>
    <div class="mbody">
      <div class="field"><label>الهدف المحدد *</label><select id="pj-obj" required>${objs.map(o=>`<option value="${o.id}" ${p&&p.objectiveId===o.id?'selected':''}>${o.name}</option>`).join('')}</select></div>
      <div class="field" style="margin-top:10px"><label>اسم المشروع/المبادرة *</label><input id="pj-name" required value="${p?esc(p.name):''}"></div>
    </div>
    <div class="mfoot"><button class="btn" onclick="submitProject('${id||''}')">💾 حفظ</button><button class="btn secondary" onclick="closeModal()">إلغاء</button></div>
  </div></div>`);
}
function submitProject(id){
  const v=document.getElementById('pj-name').value.trim();if(!v){alert('أدخل الاسم');return;}
  const data={objectiveId:document.getElementById('pj-obj').value,name:v};
  if(id){Object.assign(state.projects.find(x=>x.id===id),data);logAudit('تعديل','مشروع/مبادرة',v);}
  else{state.projects.push({id:uid(),...data,year:state.planYear});logAudit('إضافة','مشروع/مبادرة',v);}
  closeModal();render();
}
function copyPlanToNewYear(){
  const ny=prompt('أدخل السنة الجديدة:',state.planYear+1);
  if(!ny)return;
  const newYear=parseInt(ny);
  if(state.domains.some(d=>d.year===newYear)||state.intermediateResults.some(i=>i.year===newYear)){alert('توجد خطة بالفعل لهذه السنة');return;}
  const irMap={},domMap={},objMap={};
  state.intermediateResults.filter(i=>i.year===state.planYear).forEach(i=>{const nid=uid();irMap[i.id]=nid;state.intermediateResults.push({id:nid,name:i.name,year:newYear});});
  state.domains.filter(d=>d.year===state.planYear).forEach(d=>{const nid=uid();domMap[d.id]=nid;state.domains.push({id:nid,irId:irMap[d.irId],name:d.name,year:newYear});});
  state.objectives.filter(o=>o.year===state.planYear).forEach(o=>{const nid=uid();objMap[o.id]=nid;state.objectives.push({id:nid,domainId:domMap[o.domainId],name:o.name,baseline:o.baseline,perfIndicator:o.perfIndicator,impactIndicator:o.impactIndicator,year:newYear});});
  state.projects.filter(p=>p.year===state.planYear).forEach(p=>{state.projects.push({id:uid(),objectiveId:objMap[p.objectiveId],name:p.name,year:newYear});});
  logAudit('نسخ','خطة استراتيجية','من '+state.planYear+' إلى '+newYear);
  state.planYear=newYear;
  render();
  alert('تم نسخ هيكل الخطة كاملاً (بما فيه النتائج الوسيطة) إلى سنة '+newYear+' بنجاح. يمكنك الآن ربط فعاليات جديدة بها.');
}

/* ============================= KPI DASHBOARD ============================= */
function renderKPI(){
  const doms=state.domains.filter(d=>d.year===state.planYear);
  const totalObjectives=state.objectives.filter(o=>o.year===state.planYear).length;
  const totalProjects=state.projects.filter(p=>p.year===state.planYear).length;
  const totalEvents=state.annualEvents.length;
  const byDept={};
  DEPTS.forEach(d=>{
    const evs=state.annualEvents.filter(e=>e.dept===d);
    byDept[d]=evs.length?Math.round(evs.reduce((s,e)=>s+annualCompletion(e),0)/evs.length):0;
  });
  return `
    <div class="kpis">
      <div class="kpi" style="border-top-color:${completionColor(planCompletion())}"><div class="v">${planCompletion()}%</div><div class="l">نسبة الإنجاز العامة للخطة</div></div>
      <div class="kpi"><div class="v">${doms.length}</div><div class="l">إجمالي المجالات</div></div>
      <div class="kpi"><div class="v">${totalObjectives}</div><div class="l">إجمالي الأهداف</div></div>
      <div class="kpi"><div class="v">${totalProjects}</div><div class="l">إجمالي المشاريع</div></div>
      <div class="kpi"><div class="v">${totalEvents}</div><div class="l">إجمالي الفعاليات</div></div>
    </div>
    <div class="section-head"><h2>نسبة الإنجاز حسب القسم</h2></div>
    <div class="card" style="padding:16px">
      ${DEPTS.map(d=>`<div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px"><span style="font-weight:700">${d}</span><span>${byDept[d]}%</span></div>
        <div class="progress-track"><div class="progress-fill" style="width:${byDept[d]}%;background:${completionColor(byDept[d])}"></div></div>
      </div>`).join('')}
    </div>
    <div class="section-head" style="margin-top:20px"><h2>مؤشرات الأهداف</h2></div>
    <div class="table-wrap card"><table><thead><tr><th>الهدف</th><th>خط الأساس</th><th>مؤشر الأداء</th><th>مؤشر الأثر</th><th>نسبة الإنجاز</th></tr></thead>
      <tbody>${state.objectives.filter(o=>o.year===state.planYear).map(o=>`<tr><td style="font-weight:700">${esc(o.name)}</td><td>${o.baseline||0}</td>
        <td>${esc(o.perfIndicator||'—')}</td><td>${esc(o.impactIndicator||'—')}</td><td><span class="pill" style="background:${completionColor(objectiveCompletion(o))}22;color:${completionColor(objectiveCompletion(o))}">${objectiveCompletion(o)}%</span></td></tr>`).join('')
        ||'<tr><td colspan="5" class="empty">لا توجد أهداف</td></tr>'}</tbody></table></div>`;
}

/* ============================= AUDIT LOG ============================= */
if(!state.auditUI) state.auditUI={q:''};
function renderAudit(){
  const ui=state.auditUI;
  const filtered=state.auditLog.filter(a=>!ui.q||a.entity.includes(ui.q)||a.details.includes(ui.q)||a.user.includes(ui.q));
  return `
    <div class="section-head"><div><p>${filtered.length} من ${state.auditLog.length} عملية مسجّلة</p></div></div>
    <div class="search-bar"><input placeholder="بحث بالمستخدم أو العنصر..." value="${esc(ui.q)}" oninput="state.auditUI.q=this.value;render()" style="min-width:240px"></div>
    <div class="table-wrap card"><table><thead><tr><th>التاريخ والوقت</th><th>المستخدم</th><th>الإجراء</th><th>العنصر</th><th>التفاصيل</th></tr></thead>
      <tbody>${filtered.slice(0,200).map(a=>`<tr><td style="direction:ltr;font-size:11px">${a.ts.slice(0,16).replace('T',' ')}</td><td>${esc(a.user)}</td>
        <td><span class="pill gray">${a.action}</span></td><td>${esc(a.entity)}</td><td>${esc(a.details)}</td></tr>`).join('')
        ||'<tr><td colspan="5" class="empty">لا توجد عمليات مسجّلة بعد</td></tr>'}</tbody></table></div>`;
}

/* boot */
renderLoginScreen();
</script>
